info:
  name: Contact
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/api/contact"
  body:
    type: json
    data: |-
      {
        "name": "Test User",
        "company": "Test Company",
        "email": "test@example.com",
        "message": "This is a test message from Bruno."
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns 200", function() {
          expect(res.status).to.equal(200);
        });

        test("success is true", function() {
          expect(res.body.success).to.equal(true);
        });

        test("has confirmation message", function() {
          expect(res.body.data.message).to.be.a("string");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
